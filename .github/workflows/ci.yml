name: CI

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  validate-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Validate PR Title and Body
        env:
          TITLE: ${{ github.event.pull_request.title }}
          BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "=== PR 제목 검증 ==="

          # 제목 prefix (예: [student]) 체크
          if ! echo "$TITLE" | grep -qP '^\[.+\]'; then
            echo "❌ 제목에 [domain] prefix가 없습니다."
            echo "   예시: [student] QueryDSL 벌크 업데이트로 성능 개선"
            exit 1
          fi

          echo "✅ 제목 검증 통과"


          echo "=== PR 본문 검증 ==="

          # 필수 섹션 체크
          if ! echo "$BODY" | grep -q '## 개요'; then
            echo "❌ '## 개요' 섹션이 없습니다."
            exit 1
          fi

          if ! echo "$BODY" | grep -q '## 변경 사항'; then
            echo "❌ '## 변경 사항' 섹션이 없습니다."
            exit 1
          fi

          echo "✅ 본문 검증 통과"

  setup-pr-metadata:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Setup PR Metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"

          # 자동 리뷰어 목록
          ALL_REVIEWERS="jyx-07,hej090224"

          # 본인(PR AUTHOR)은 제외
          REVIEWERS=$(echo "$ALL_REVIEWERS" | tr ',' '\n' | grep -v "^${PR_AUTHOR}$" | tr '\n' ',' | sed 's/,$//')

          # 리뷰어 등록
          if [ -n "$REVIEWERS" ]; then
            gh pr edit $PR_NUMBER \
              --repo ${{ github.repository }} \
              --add-reviewer "$REVIEWERS"
          fi


  build-and-test:
    runs-on: ubuntu-latest
    needs: [validate-pr]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ensure Gradlew Executable
        run: chmod +x ./gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false
          cache-cleanup: always

      - name: Build
        run: ./gradlew build --parallel --build-cache -x test