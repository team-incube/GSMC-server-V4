# .github/workflows/ci.yml
name: CI

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Validate PR Title and Body
        env:
          TITLE: ${{ github.event.pull_request.title }}
          BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "=== PR 제목 검증 ==="

          if ! echo "$TITLE" | grep -qP '^\[.+\]'; then
            echo "❌ 제목에 [domain] prefix가 없습니다."
            echo "   예시: [student] QueryDSL 벌크 업데이트로 성능 개선 #269"
            exit 1
          fi

          if ! echo "$TITLE" | grep -qP '#\d+'; then
            echo "❌ 제목에 이슈 번호가 없습니다."
            echo "   예시: [student] QueryDSL 벌크 업데이트로 성능 개선 #269"
            exit 1
          fi

          echo "✅ 제목 검증 통과"

          echo "=== PR 본문 검증 ==="

          if ! echo "$BODY" | grep -q '## 개요'; then
            echo "❌ '## 개요' 섹션이 없습니다."
            exit 1
          fi

          if ! echo "$BODY" | grep -q '## 변경 사항'; then
            echo "❌ '## 변경 사항' 섹션이 없습니다."
            exit 1
          fi

          echo "✅ 본문 검증 통과"

  setup-pr-metadata:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Setup PR Metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          ALL_REVIEWERS="jyx-07,hej090224,snowykte0426"
          REVIEWERS=$(echo "$ALL_REVIEWERS" | tr ',' '\n' | grep -v "^${PR_AUTHOR}$" | tr '\n' ',' | sed 's/,$//')
          if [ -n "$REVIEWERS" ]; then
            gh pr edit $PR_NUMBER --repo ${{ github.repository }} --add-reviewer "$REVIEWERS"
          fi

  build-and-test:
    runs-on: ubuntu-latest
    needs: [validate-pr]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: gsmc_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and Test
        run: ./gradlew build --parallel --build-cache
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/gsmc_test?serverTimezone=Asia/Seoul
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root